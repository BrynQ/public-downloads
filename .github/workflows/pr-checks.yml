# Caller workflow — copy this to each customer repo at:
#   .github/workflows/pr-checks.yml
#
# Calls the canonical reusable workflow in brynq-shared-actions. When the toolkit
# is updated, every customer repo picks up the new rules automatically.
#
# To make this a required check for auto-merge:
#   Settings → Branches → master → Branch protection rule
#   → Require status checks → "Customer PR Checks / customer-pr-checks"

name: PR Checks

on:
  pull_request:
    branches: [master, main]

# Minimal least-privilege defaults; reusable workflow declares its own permissions block.
permissions:
  contents: read

jobs:
  customer-pr-checks:
    uses: BrynQ/brynq-shared-actions/.github/workflows/customer-pr-checks.yml@v1
    secrets: inherit
